<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#101615">
  <title>Cue Sheet Live</title>
  <link rel="stylesheet" href="./audience.css">
</head>
<body>
  <header class="audience-topbar">
    <a class="audience-brand" href="./audience.html" aria-label="Cue Sheet Live">
      <img src="./imgs/logo.png" alt="ㅅㅁㅅ">
      <span>Cue Sheet</span>
    </a>
    <button id="refreshButton" class="refresh-button" type="button">새로고침</button>
  </header>

  <main class="audience-shell">
    <section class="live-summary" aria-labelledby="audienceTitle">
      <div class="live-title-block">
        <p class="live-kicker">Live Set</p>
        <h1 id="audienceTitle">오늘의 큐시트</h1>
        <p id="liveStatus" class="live-status" aria-live="polite">큐시트를 불러오는 중입니다.</p>
      </div>
      <dl class="summary-stats" aria-label="큐시트 요약">
        <div>
          <dt>곡 수</dt>
          <dd id="cueCount">--</dd>
        </div>
      </dl>
    </section>

    <section class="setlist-section" aria-labelledby="setlistTitle">
      <div class="setlist-header">
        <div>
          <p class="section-label">Set Order</p>
          <h2 id="setlistTitle">공연 순서</h2>
        </div>
      </div>

      <p id="emptyState" class="empty-state" hidden>아직 공개된 큐시트가 없습니다.</p>
      <ol id="cueList" class="audience-cue-list"></ol>
      <div class="audience-list-logo" aria-label="ㅅㅁㅅ">
        <img src="./imgs/logo.png" alt="ㅅㅁㅅ">
      </div>
    </section>
  </main>

  <template id="cueCardTemplate">
    <li class="cue-card">
      <span class="cue-number"></span>
      <div class="cue-copy">
        <strong class="cue-title"></strong>
      </div>
    </li>
  </template>

  <script src="./audience.js" defer></script>
</body>
</html>
