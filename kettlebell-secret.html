<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>KB Session</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11130f;
      --panel: #1b1e18;
      --panel-2: #24281f;
      --line: #373d30;
      --text: #f3f4e9;
      --muted: #9da493;
      --lime: #c7f36b;
      --lime-dark: #17200d;
      --orange: #ff9c5a;
      --danger: #ff766f;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 82% 0%, rgba(199, 243, 107, 0.10), transparent 30rem),
        var(--bg);
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--lime);
      color: #151a0f;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    .local-badge {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(27, 30, 24, 0.94);
      overflow: hidden;
    }

    .session-card {
      min-height: 610px;
      padding: clamp(24px, 4vw, 44px);
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--lime);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    h1, h2, p { margin-top: 0; }

    h1 {
      margin-bottom: 4px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      letter-spacing: -0.065em;
      line-height: 0.98;
    }

    .status {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .timer-zone {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 30px 0 22px;
      text-align: center;
    }

    .timer {
      font-size: clamp(5.5rem, 16vw, 10.5rem);
      font-weight: 900;
      letter-spacing: -0.08em;
      line-height: 0.85;
      font-variant-numeric: tabular-nums;
    }

    .phase-label {
      display: inline-flex;
      margin-top: 22px;
      padding: 8px 15px;
      border-radius: 999px;
      background: var(--lime);
      color: #151a0f;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.09em;
    }

    .phase-label.rest {
      background: var(--orange);
    }

    .progress-track {
      height: 7px;
      margin-bottom: 18px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-2);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--lime);
      transition: width 0.25s linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
    }

    .button {
      min-height: 52px;
      padding: 0 19px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 900;
    }

    .button:hover { border-color: #59634c; }

    .button.primary {
      border-color: var(--lime);
      background: var(--lime);
      color: #151a0f;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    .side {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .editor, .history {
      padding: 24px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    h2 {
      margin-bottom: 0;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
    }

    .rounds {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rounds label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-width: 0;
      height: 42px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: none;
      background: #131510;
      color: var(--text);
    }

    input:focus { border-color: var(--lime); }
    input[type="number"] { font-variant-numeric: tabular-nums; }
    #roundsInput { width: 62px; }

    .exercise-list {
      display: grid;
      gap: 10px;
    }

    .exercise {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 70px 70px 38px;
      gap: 8px;
      align-items: end;
    }

    .field span {
      display: block;
      margin: 0 0 5px 3px;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 800;
    }

    .remove {
      width: 38px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .editor-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .summary {
      margin: 16px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.82rem;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin-top: 15px;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--panel-2);
      font-size: 0.82rem;
    }

    .history-row span { color: var(--muted); }
    .empty { color: var(--muted); font-size: 0.82rem; }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .session-card { min-height: 520px; }
    }

    @media (max-width: 520px) {
      .shell { width: min(100% - 20px, 1180px); padding-top: 16px; }
      .session-card, .editor, .history { padding: 19px; }
      .exercise { grid-template-columns: 1fr 1fr 38px; }
      .exercise .name-field { grid-column: 1 / -1; }
      .controls { grid-template-columns: 1fr 1fr; }
      .controls .primary { grid-column: 1 / -1; }
      .timer { font-size: clamp(5.2rem, 28vw, 8rem); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">KB</span> Kettlebell Session</div>
      <span class="local-badge">이 기기에만 기록</span>
    </header>

    <div class="layout">
      <section class="card session-card" aria-labelledby="currentExercise">
        <p class="eyebrow" id="roundStatus">준비 · 1라운드</p>
        <h1 id="currentExercise">세션을 설정하세요</h1>
        <p class="status" id="nextExercise">운동을 추가하고 시작을 누르세요.</p>

        <div class="timer-zone" aria-live="polite">
          <div>
            <div class="timer" id="timer">00:00</div>
            <span class="phase-label" id="phaseLabel">READY</span>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="controls">
          <button class="button primary" id="startPause">세션 시작</button>
          <button class="button" id="skip" disabled>건너뛰기</button>
          <button class="button" id="reset" disabled>초기화</button>
        </div>
      </section>

      <aside class="side">
        <section class="card editor" aria-labelledby="settingsTitle">
          <div class="section-head">
            <h2 id="settingsTitle">오늘의 루틴</h2>
            <div class="rounds">
              <label for="roundsInput">라운드</label>
              <input id="roundsInput" type="number" min="1" max="99" value="3">
            </div>
          </div>
          <div class="exercise-list" id="exerciseList"></div>
          <div class="editor-actions">
            <button class="button" id="addExercise">+ 운동 추가</button>
            <button class="button" id="saveRoutine">루틴 저장</button>
          </div>
          <p class="summary" id="summary"></p>
        </section>

        <section class="card history" aria-labelledby="historyTitle">
          <div class="section-head">
            <h2 id="historyTitle">최근 완료</h2>
            <button class="remove" id="clearHistory" aria-label="완료 기록 전체 삭제">×</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </aside>
    </div>
  </main>

  <template id="exerciseTemplate">
    <div class="exercise">
      <label class="field name-field">
        <span>운동</span>
        <input class="exercise-name" type="text" maxlength="40" aria-label="운동 이름">
      </label>
      <label class="field">
        <span>운동(초)</span>
        <input class="work-time" type="number" min="1" max="3600" aria-label="운동 시간(초)">
      </label>
      <label class="field">
        <span>휴식(초)</span>
        <input class="rest-time" type="number" min="0" max="3600" aria-label="휴식 시간(초)">
      </label>
      <button class="remove remove-exercise" aria-label="운동 삭제">×</button>
    </div>
  </template>

  <script>
    (() => {
      const DEFAULTS = [
        { name: "케틀벨 스윙", work: 40, rest: 20 },
        { name: "고블릿 스쿼트", work: 40, rest: 20 },
        { name: "클린 & 프레스", work: 40, rest: 40 }
      ];
      const STORAGE_ROUTINE = "kb-secret-routine-v1";
      const STORAGE_HISTORY = "kb-secret-history-v1";
      const $ = (selector) => document.querySelector(selector);
      const list = $("#exerciseList");
      const template = $("#exerciseTemplate");
      let sequence = [];
      let stepIndex = 0;
      let secondsLeft = 0;
      let totalStepSeconds = 0;
      let intervalId = null;
      let state = "idle";

      function safeParse(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key)) || fallback; }
        catch { return fallback; }
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, Number(value) || min));
      }

      function addExercise(data = { name: "새 운동", work: 30, rest: 15 }) {
        const node = template.content.firstElementChild.cloneNode(true);
        node.querySelector(".exercise-name").value = data.name;
        node.querySelector(".work-time").value = data.work;
        node.querySelector(".rest-time").value = data.rest;
        node.querySelector(".remove-exercise").addEventListener("click", () => {
          if (list.children.length > 1) node.remove();
          updateSummary();
        });
        node.querySelectorAll("input").forEach(input => input.addEventListener("input", updateSummary));
        list.appendChild(node);
        updateSummary();
      }

      function getRoutine() {
        const exercises = [...list.querySelectorAll(".exercise")].map(row => ({
          name: row.querySelector(".exercise-name").value.trim() || "이름 없는 운동",
          work: clamp(row.querySelector(".work-time").value, 1, 3600),
          rest: clamp(row.querySelector(".rest-time").value, 0, 3600)
        }));
        return { rounds: clamp($("#roundsInput").value, 1, 99), exercises };
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
        const secs = (seconds % 60).toString().padStart(2, "0");
        return `${mins}:${secs}`;
      }

      function updateSummary() {
        const routine = getRoutine();
        const perRound = routine.exercises.reduce((sum, item) => sum + item.work + item.rest, 0);
        const total = perRound * routine.rounds;
        $("#summary").textContent = `${routine.exercises.length}개 운동 × ${routine.rounds}라운드 · 예상 ${formatTime(total)}`;
      }

      function buildSequence() {
        const routine = getRoutine();
        const result = [];
        for (let round = 1; round <= routine.rounds; round++) {
          routine.exercises.forEach((exercise, index) => {
            result.push({ type: "work", duration: exercise.work, name: exercise.name, round, totalRounds: routine.rounds });
            const isFinal = round === routine.rounds && index === routine.exercises.length - 1;
            if (exercise.rest > 0 && !isFinal) {
              result.push({ type: "rest", duration: exercise.rest, name: exercise.name, round, totalRounds: routine.rounds });
            }
          });
        }
        return result;
      }

      function renderStep() {
        const step = sequence[stepIndex];
        if (!step) return completeSession();
        secondsLeft = step.duration;
        totalStepSeconds = step.duration;
        $("#currentExercise").textContent = step.type === "work" ? step.name : "호흡을 고르세요";
        $("#roundStatus").textContent = `${step.round} / ${step.totalRounds} 라운드`;
        $("#phaseLabel").textContent = step.type === "work" ? "WORK" : "REST";
        $("#phaseLabel").classList.toggle("rest", step.type === "rest");
        const next = sequence[stepIndex + 1];
        $("#nextExercise").textContent = next
          ? `다음 · ${next.type === "work" ? next.name : "휴식"}`
          : "마지막 구간입니다.";
        updateClock();
      }

      function updateClock() {
        $("#timer").textContent = formatTime(secondsLeft);
        const elapsed = totalStepSeconds ? (totalStepSeconds - secondsLeft) / totalStepSeconds : 0;
        $("#progressBar").style.width = `${Math.min(100, elapsed * 100)}%`;
        document.title = state === "running"
          ? `${formatTime(secondsLeft)} · ${sequence[stepIndex]?.name || "KB"}`
          : "KB Session";
      }

      function tick() {
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          beep();
          stepIndex += 1;
          renderStep();
        } else {
          if (secondsLeft <= 3) beep(520);
          updateClock();
        }
      }

      function beep(frequency = 760) {
        try {
          const audio = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audio.createOscillator();
          const gain = audio.createGain();
          oscillator.frequency.value = frequency;
          gain.gain.setValueAtTime(0.08, audio.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.12);
          oscillator.connect(gain).connect(audio.destination);
          oscillator.start();
          oscillator.stop(audio.currentTime + 0.13);
        } catch {}
        if (navigator.vibrate) navigator.vibrate(80);
      }

      function start() {
        if (state === "idle") {
          sequence = buildSequence();
          stepIndex = 0;
          renderStep();
          $("#skip").disabled = false;
          $("#reset").disabled = false;
          lockEditor(true);
        }
        clearInterval(intervalId);
        state = "running";
        intervalId = setInterval(tick, 1000);
        $("#startPause").textContent = "일시정지";
        updateClock();
      }

      function pause() {
        clearInterval(intervalId);
        state = "paused";
        $("#startPause").textContent = "계속하기";
        updateClock();
      }

      function reset() {
        clearInterval(intervalId);
        state = "idle";
        sequence = [];
        stepIndex = 0;
        secondsLeft = 0;
        $("#timer").textContent = "00:00";
        $("#progressBar").style.width = "0";
        $("#currentExercise").textContent = "세션을 설정하세요";
        $("#roundStatus").textContent = `준비 · ${getRoutine().rounds}라운드`;
        $("#nextExercise").textContent = "운동을 추가하고 시작을 누르세요.";
        $("#phaseLabel").textContent = "READY";
        $("#phaseLabel").classList.remove("rest");
        $("#startPause").textContent = "세션 시작";
        $("#skip").disabled = true;
        $("#reset").disabled = true;
        document.title = "KB Session";
        lockEditor(false);
      }

      function completeSession() {
        clearInterval(intervalId);
        const routine = getRoutine();
        const history = safeParse(STORAGE_HISTORY, []);
        history.unshift({
          date: new Date().toISOString(),
          rounds: routine.rounds,
          exercises: routine.exercises.length
        });
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history.slice(0, 8)));
        renderHistory();
        state = "complete";
        $("#timer").textContent = "DONE";
        $("#progressBar").style.width = "100%";
        $("#currentExercise").textContent = "오늘도 해냈습니다";
        $("#roundStatus").textContent = "SESSION COMPLETE";
        $("#nextExercise").textContent = `${routine.exercises.length}개 운동 · ${routine.rounds}라운드 완료`;
        $("#phaseLabel").textContent = "FINISH";
        $("#phaseLabel").classList.remove("rest");
        $("#startPause").textContent = "다시 시작";
        $("#skip").disabled = true;
        lockEditor(false);
        beep(920);
      }

      function lockEditor(locked) {
        document.querySelectorAll(".editor input, .editor button").forEach(el => el.disabled = locked);
      }

      function renderHistory() {
        const history = safeParse(STORAGE_HISTORY, []);
        $("#historyList").innerHTML = "";
        if (!history.length) {
          $("#historyList").innerHTML = '<p class="empty">아직 완료한 세션이 없습니다.</p>';
          return;
        }
        history.forEach(item => {
          const row = document.createElement("div");
          row.className = "history-row";
          const date = new Date(item.date);
          row.innerHTML = `<strong>${item.exercises}개 운동 · ${item.rounds}R</strong><span>${date.toLocaleDateString("ko-KR", { month: "short", day: "numeric" })}</span>`;
          $("#historyList").appendChild(row);
        });
      }

      $("#addExercise").addEventListener("click", () => addExercise());
      $("#roundsInput").addEventListener("input", updateSummary);
      $("#saveRoutine").addEventListener("click", () => {
        localStorage.setItem(STORAGE_ROUTINE, JSON.stringify(getRoutine()));
        const button = $("#saveRoutine");
        button.textContent = "저장됨";
        setTimeout(() => button.textContent = "루틴 저장", 1200);
      });
      $("#startPause").addEventListener("click", () => {
        if (state === "running") pause();
        else {
          if (state === "complete") reset();
          start();
        }
      });
      $("#skip").addEventListener("click", () => {
        if (state !== "running" && state !== "paused") return;
        stepIndex += 1;
        renderStep();
      });
      $("#reset").addEventListener("click", reset);
      $("#clearHistory").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_HISTORY);
        renderHistory();
      });

      const saved = safeParse(STORAGE_ROUTINE, { rounds: 3, exercises: DEFAULTS });
      $("#roundsInput").value = saved.rounds || 3;
      (saved.exercises?.length ? saved.exercises : DEFAULTS).forEach(addExercise);
      renderHistory();
      reset();
    })();
  </script>
</body>
</html>
